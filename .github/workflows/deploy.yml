name: Deploy

# Production deploys happen on merge to `production` (main is dev/PR work only).
# The job just runs the same ./scripts/deploy.sh you can run locally.
on:
  push:
    branches: [production]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Reads CLOUDFLARE_API_TOKEN from this GitHub Environment's secrets. Add
    # required-reviewer / branch protection rules on the environment to gate prod.
    environment: production
    env:
      # wrangler reads these automatically. ACCOUNT_ID only needed if the token
      # spans multiple Cloudflare accounts.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run deploy
